<h2 class="sr-only">Visualization showing user cohorts migrating upward along a realized value curve over time, from basic usage through increasing levels of value realization.</h2>
<style>
  .lbl { font-family: var(--font-sans); font-size: 12px; fill: var(--color-text-secondary); }
  .lbl-b { font-family: var(--font-sans); font-size: 13px; fill: var(--color-text-primary); font-weight: 500; }
  .lbl-s { font-family: var(--font-sans); font-size: 11px; fill: var(--color-text-tertiary); }
  .hd { font-family: var(--font-sans); font-size: 16px; fill: var(--color-text-primary); font-weight: 500; }
  @keyframes rise1 { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rise2 { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rise3 { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: no-preference) {
    .cohort-1 { animation: rise1 0.5s ease-out 0.2s both; }
    .cohort-2 { animation: rise2 0.5s ease-out 0.5s both; }
    .cohort-3 { animation: rise3 0.5s ease-out 0.8s both; }
  }
</style>
<svg width="100%" viewBox="0 0 680 460" role="img">
  <title>The real signal is movement between cohorts</title>
  <desc>A value curve rising from left to right with three cohort clusters at different points along it, connected by arrows showing users migrating from basic usage to deeper value realization over time.</desc>

  <text class="hd" x="40" y="36">The real signal is movement</text>
  <text class="lbl" x="40" y="56">Track whether users migrate up the value curve, not where the average sits.</text>

  <!-- Axes -->
  <line x1="80" y1="360" x2="640" y2="360" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  <line x1="80" y1="80" x2="80" y2="360" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

  <!-- X axis -->
  <text class="lbl-s" x="130" y="380" text-anchor="middle">Weeks</text>
  <text class="lbl-s" x="350" y="380" text-anchor="middle">Months</text>
  <text class="lbl-s" x="570" y="380" text-anchor="middle">Quarters</text>
  <text class="lbl" x="360" y="398" text-anchor="middle" style="fill: var(--color-text-tertiary)">Time with product →</text>

  <!-- Y axis -->
  <text class="lbl-s" x="70" y="330" text-anchor="end">Basic</text>
  <text class="lbl-s" x="70" y="220" text-anchor="end">Deeper</text>
  <text class="lbl-s" x="70" y="120" text-anchor="end">Durable</text>

  <!-- The value curve — a smooth rising path -->
  <path d="M95,340 C140,338 180,330 230,305 C280,278 330,235 400,195 C450,168 510,135 580,110 C610,100 630,96 645,94" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Filled gradient area under curve -->
  <path d="M95,340 C140,338 180,330 230,305 C280,278 330,235 400,195 C450,168 510,135 580,110 C610,100 630,96 645,94 L645,360 L95,360 Z" fill="url(#vg)" opacity="0.06"/>
  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF9F27"/>
      <stop offset="100%" stop-color="#0C66E4"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- COHORT 1: Basic usage (weeks) -->
  <g class="cohort-1">
    <!-- Cluster of dots -->
    <circle cx="125" cy="332" r="5" fill="#EF9F27" opacity="0.7"/>
    <circle cx="140" cy="328" r="6" fill="#EF9F27" opacity="0.8"/>
    <circle cx="155" cy="335" r="4.5" fill="#EF9F27" opacity="0.6"/>
    <circle cx="148" cy="320" r="5.5" fill="#EF9F27" opacity="0.7"/>
    <circle cx="132" cy="318" r="4" fill="#EF9F27" opacity="0.5"/>
    <circle cx="160" cy="324" r="5" fill="#EF9F27" opacity="0.65"/>
    <circle cx="118" cy="325" r="3.5" fill="#EF9F27" opacity="0.5"/>
    <!-- Label -->
    <rect x="98" y="264" width="126" height="44" rx="8" fill="var(--color-background-secondary)"/>
    <text class="lbl-b" x="161" y="281" text-anchor="middle" style="fill: #BA7517">Speed to value</text>
    <text class="lbl-s" x="161" y="298" text-anchor="middle" style="fill: #854F0B">Learning the tool</text>
  </g>

  <!-- Migration arrow 1→2 -->
  <path d="M175,315 C220,300 260,275 310,248" fill="none" stroke="#0C66E4" stroke-width="1" opacity="0.35" marker-end="url(#arrow)"/>

  <!-- COHORT 2: Deeper value (months) -->
  <g class="cohort-2">
    <circle cx="330" cy="238" r="5.5" fill="#0C66E4" opacity="0.5"/>
    <circle cx="348" cy="228" r="6.5" fill="#0C66E4" opacity="0.6"/>
    <circle cx="365" cy="235" r="5" fill="#0C66E4" opacity="0.5"/>
    <circle cx="355" cy="215" r="6" fill="#0C66E4" opacity="0.65"/>
    <circle cx="340" cy="210" r="5" fill="#0C66E4" opacity="0.55"/>
    <circle cx="372" cy="220" r="4.5" fill="#0C66E4" opacity="0.45"/>
    <!-- Label -->
    <rect x="306" y="155" width="126" height="44" rx="8" fill="var(--color-background-secondary)"/>
    <text class="lbl-b" x="369" y="172" text-anchor="middle" style="fill: #0C66E4">Quality of value</text>
    <text class="lbl-s" x="369" y="189" text-anchor="middle" style="fill: #185FA5">Work is improving</text>
  </g>

  <!-- Migration arrow 2→3 -->
  <path d="M385,210 C430,185 470,160 520,140" fill="none" stroke="#0C66E4" stroke-width="1" opacity="0.35" marker-end="url(#arrow)"/>

  <!-- COHORT 3: Transformative (quarters) -->
  <g class="cohort-3">
    <circle cx="545" cy="128" r="5" fill="#0C66E4" opacity="0.75"/>
    <circle cx="562" cy="118" r="7" fill="#0C66E4" opacity="0.85"/>
    <circle cx="580" cy="125" r="5.5" fill="#0C66E4" opacity="0.7"/>
    <circle cx="570" cy="108" r="6" fill="#0C66E4" opacity="0.8"/>
    <circle cx="552" cy="112" r="4.5" fill="#0C66E4" opacity="0.65"/>
    <!-- Label -->
    <rect x="494" y="56" width="156" height="44" rx="8" fill="var(--color-background-secondary)"/>
    <text class="lbl-b" x="572" y="73" text-anchor="middle" style="fill: #0C66E4">Transformative value</text>
    <text class="lbl-s" x="572" y="90" text-anchor="middle" style="fill: #185FA5">How work gets done changed</text>
  </g>

  <!-- Bottom insight -->
  <rect x="100" y="418" width="480" height="32" rx="8" fill="var(--color-background-secondary)"/>
  <text x="340" y="438" text-anchor="middle" style="font-family: var(--font-sans); font-size: 12px; fill: var(--color-text-secondary)">The growth signal is users moving between cohorts, not staying in one.</text>
</svg>
